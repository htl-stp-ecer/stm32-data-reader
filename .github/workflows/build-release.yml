name: Build & Release

on:
  push:
    branches: [ main ]

jobs:
  build-firmware:
    runs-on: self-hosted
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build firmware
        run: |
          cd firmware
          docker compose build
          docker compose up --exit-code-from build-wombat-firmware

      - name: Stage firmware artifacts
        run: |
          mkdir -p firmware-out
          cp firmware/build/Firmware/wombat.bin firmware-out/
          cp firmware/flashFiles/* firmware-out/

      - name: Upload firmware artifacts
        uses: actions/upload-artifact@v4
        with:
          name: firmware
          path: firmware-out/*

  build-reader:
    runs-on: self-hosted
    permissions:
      contents: write

    steps:
      - name: Checkout (with submodules)
        uses: actions/checkout@v4
        with:
          submodules: recursive
          token: ${{ secrets.GH_PAT }}

      - name: Build ARM64 binary
        run: |
          SKIP_FIRMWARE=1 BUILD_NUMBER=${{ github.run_number }} NINJA_JOBS=4 bash ./build.sh
        env:
          CCACHE_HOST_DIR: ${{ github.workspace }}/.ccache

      - name: Upload reader artifact
        uses: actions/upload-artifact@v4
        with:
          name: reader
          path: build/stm32_data_reader

  release:
    needs: [ build-firmware, build-reader ]
    runs-on: self-hosted
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download firmware artifact
        uses: actions/download-artifact@v4
        with:
          name: firmware
          path: artifacts/firmware

      - name: Download reader artifact
        uses: actions/download-artifact@v4
        with:
          name: reader
          path: artifacts/reader

      - name: Bundle release files
        run: |
          mkdir -p release
          cp artifacts/reader/stm32_data_reader release/
          cp artifacts/firmware/wombat.bin release/
          cp artifacts/firmware/flash_wombat.sh release/
          cp artifacts/firmware/reset_coprocessor.sh release/
          cp artifacts/firmware/init_gpio.sh release/
          cp install.py release/
          cp systemd/stm32_data_reader.service release/
          cp systemd/lcm-loopback-multicast.service release/
          echo "Release contents:" && ls -la release/
          cd release && tar czf ../stm32_data_reader-v1.0.${{ github.run_number }}.tar.gz *

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v1.0.${{ github.run_number }}
          name: v1.0.${{ github.run_number }}
          generate_release_notes: true
          files: stm32_data_reader-v1.0.${{ github.run_number }}.tar.gz
